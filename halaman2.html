<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Data Demografi & Keuangan - Apriliana Putri</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        .header { 
            background: linear-gradient(135deg, #2c5aa0 0%, #1e40af 100%); 
            color: white; 
            padding: 30px; 
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .content { padding: 40px; }
        .form-group { 
            margin-bottom: 25px; 
        }
        label { 
            display: block; 
            font-weight: 600; 
            color: #333; 
            margin-bottom: 8px; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #2c5aa0; 
            box-shadow: 0 0 0 3px rgba(44,90,160,0.1);
        }
        .date-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        /* Tombol Jenis Transaksi */
        .transaksi-buttons { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 15px;
        }
        .trans-btn { 
            flex: 1; 
            min-width: 120px; 
            padding: 12px; 
            border: 2px solid #10b981; 
            background: white; 
            color: #10b981; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.3s;
        }
        .trans-btn.active, .trans-btn:hover { 
            background: #10b981; 
            color: white; 
        }
        .trans-btn.debet { border-color: #ef4444; color: #ef4444; }
        .trans-btn.debet.active, .trans-btn.debet:hover { background: #ef4444; }
        
        /* Bank Search */
        .bank-search { position: relative; }
        .bank-list { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            right: 0; 
            background: white; 
            border: 2px solid #e2e8f0; 
            border-top: none; 
            max-height: 200px; 
            overflow-y: auto; 
            border-radius: 0 0 10px 10px; 
            display: none; 
            z-index: 10;
        }
        .bank-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .bank-item:hover { background: #f8fafc; }
        .bank-item.active { background: #e0f2fe; }
        
        button[type="submit"] { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; 
            border: none; 
            padding: 18px 40px; 
            font-size: 1.1em; 
            font-weight: 600; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 30px;
        }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16,185,129,0.4); }
        
        @media (max-width: 768px) {
            .row, .date-group { grid-template-columns: 1fr; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Data Demografi & Keuangan</h1>
            <p>Apriliana Putri - Sosial Ekonomi Perikanan</p>
        </div>
        
        <form class="content" id="dataForm">
            <!-- DEMOGRAFI -->
            <h2 style="color: #2c5aa0; margin-bottom: 30px; border-bottom: 3px solid #10b981; padding-bottom: 10px;">1. Data Demografi</h2>
            
            <div class="row">
                <div class="form-group">
                    <label>1. Nama Pengguna *</label>
                    <input type="text" name="nama" required placeholder="Apriliana Putri">
                </div>
                <div class="form-group">
                    <label>4. No. Telepon *</label>
                    <input type="tel" name="telpon" required placeholder="0812-3456-7890">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group full-width">
                    <label>3. Alamat Lengkap *</label>
                    <textarea name="alamat" rows="3" required placeholder="Jl. Perikanan No. XX, Banjarmasin, Kalsel"></textarea>
                </div>
                <div class="form-group">
                    <label>5. Email *</label>
                    <input type="email" name="email" required placeholder="apriliana@unlam.ac.id">
                </div>
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>2. Tanggal Lahir *</label>
                    <div class="date-group">
                        <select name="tgl" required>
                            <option value="">Tanggal</option>
                            <script>for(let i=1;i<=31;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                        <select name="bln" required>
                            <option value="">Bulan</option>
                            <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                            <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                            <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                            <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                        </select>
                        <select name="thn" required>
                            <option value="">Tahun</option>
                            <script>for(let i=2000;i<=2026;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>6. Pendidikan *</label>
                    <select name="pendidikan" required>
                        <option value="">Pilih Tingkat Pendidikan</option>
                        <option value="SD">SD - Sekolah Dasar</option>
                        <option value="SMP">SMP - Sekolah Menengah Pertama</option>
                        <option value="SMA">SMA/SMK - Sekolah Menengah Atas</option>
                        <option value="D3">D3 - Diploma 3</option>
                        <option value="S1">S1 - Sarjana</option>
                        <option value="S2">S2 - Magister</option>
                        <option value="S3">S3 - Doktor</option>
                    </select>
                </div>
            </div>

            <!-- DATA BANK -->
            <h2 style="color: #2c5aa0; margin: 40px 0 20px 0; border-bottom: 3px solid #10b981; padding-bottom: 10px;">2. Data Bank</h2>
            <div class="row">
                <div class="form-group">
                    <label>Nama Bank *</label>
                    <div class="bank-search">
                        <input type="text" id="bankSearch" placeholder="Cari bank (BCA, BRI, Mandiri, BNI...)" list="bankList">
                        <datalist id="bankList">
                            <option value="BCA">BCA</option>
                            <option value="BNI">BNI</option>
                            <option value="BRI">BRI</option>
                            <option value="Mandiri">Bank Mandiri</option>
                            <option value="BNI Syariah">BNI Syariah</option>
                            <option value="BRI Syariah">BRI Syariah</option>
                            <option value="CIMB Niaga">CIMB Niaga</option>
                            <option value="Danamon">Bank Danamon</option>
                        </datalist>
                        <div class="bank-list" id="bankDropdown"></div>
                    </div>
                    <input type="hidden" name="nama_bank" id="namaBank">
                </div>
                <div class="form-group">
                    <label>Nomor Rekening *</label>
                    <input type="text" name="no_rek" required placeholder="1234567890">
                </div>
            </div>

            <!-- DATA TRANSAKSI -->
            <h2 style="color: #2c5aa0; margin: 40px 0 20px 0; border-bottom: 3px solid #10b981; padding-bottom: 10px;">3. Data Transaksi Keuangan</h2>
            
            <div class="form-group">
                <label>Tanggal Transaksi *</label>
                <div class="date-group">
                    <select name="tgl_trans" required>
                        <option value="">Tanggal</option>
                        <script>for(let i=1;i<=31;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                    </select>
                    <select name="bln_trans" required>
                        <option value="">Bulan</option>
                        <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                        <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                        <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                        <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
                    </select>
                    <select name="thn_trans" required>
                        <option value="">Tahun</option>
                        <script>for(let i=2024;i<=2026;i++)document.write(`<option value="${i}">${i}</option>`);</script>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Uraian Transaksi *</label>
                <input type="text" name="uraian" required placeholder="Bayar SPP / Beli alat penelitian / dll">
            </div>
            
            <div class="form-group">
                <label>Jenis Transaksi *</label>
                <div class="transaksi-buttons">
                    <button type="button" class="trans-btn active" data-jenis="Kredit">KREDIT (+)</button>
                    <button type="button" class="trans-btn debet" data-jenis="Debet">DEBET (-)</button>
                </div>
                <input type="hidden" name="jenis_trans" value="Kredit" id="jenisTrans">
            </div>
            
            <div class="row">
                <div class="form-group">
                    <label>Debet (Rp) *</label>
                    <input type="number" name="debet" min="0" step="1000" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Kredit (Rp) *</label>
                    <input type="number" name="kredit" min="0" step="1000" placeholder="0">
                </div>
            </div>

            <button type="submit">💾 Simpan Data Lengkap</button>
             <br>
             <a herf="index.html"></a>
             <a href="halaman1.html"></a>
             <a href="index.html" class="home-btn">Back Page</a>
        </form>
    </div>

    <script>
        // Bank Search & Dropdown
        const bankInput = document.getElementById('bankSearch');
        const bankHidden = document.getElementById('namaBank');
        const banks = ['BCA', 'BNI', 'BRI', 'Bank Mandiri', 'BNI Syariah', 'BRI Syariah', 'CIMB Niaga', 'Bank Danamon'];
        
        bankInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const dropdown = document.getElementById('bankDropdown');
            dropdown.innerHTML = '';
            
            if (query.length > 0) {
                banks.filter(bank => bank.toLowerCase().includes(query)).forEach(bank => {
                    const item = document.createElement('div');
                    item.className = 'bank-item';
                    item.textContent = bank;
                    item.onclick = () => {
                        bankInput.value = bank;
                        bankHidden.value = bank;
                        dropdown.style.display = 'none';
                    };
                    dropdown.appendChild(item);
                });
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        });
        
        // Hide dropdown on outside click
        document.addEventListener('click', function(e) {
            if (!bankInput.contains(e.target)) {
                document.getElementById('bankDropdown').style.display = 'none';
            }
        });

        // Jenis Transaksi Buttons
        document.querySelectorAll('.trans-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.trans-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('jenisTrans').value = this.dataset.jenis;
            });
        });

        // Form Submit
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ Data berhasil disimpan!\n(Implementasikan penyimpanan ke database/server di sini)');
            // console.log(new FormData(this)); // Untuk debugging
            this.reset();
        });
    </script>
</body>
</html>
