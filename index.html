<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apriliana Putri - Daftar Tugas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #f0f8ff 0%, #e6f3ff 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .container { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 500px; 
            width: 100%;
        }
        h1 { 
            color: #2c5aa0; 
            font-size: 2.5em; 
            margin-bottom: 10px;
        }
        .subtitle { 
            color: #666; 
            font-size: 1.2em; 
            margin-bottom: 40px;
        }
        .task-buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
        }
        .task-btn { 
            background: linear-gradient(135deg, #2c5aa0 0%, #1e40af 100%); 
            color: white; 
            border: none; 
            padding: 18px 30px; 
            font-size: 1.3em; 
            font-weight: bold; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-decoration: none; 
            display: block; 
            box-shadow: 0 10px 25px rgba(44,90,160,0.3);
        }
        .task-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(44,90,160,0.4); 
        }
        .task-btn.tugas1 { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 10px 25px rgba(16,185,129,0.3); }
        .task-btn.tugas1:hover { box-shadow: 0 15px 35px rgba(16,185,129,0.4); }
        .task-btn.tugas2 { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 10px 25px rgba(245,158,11,0.3); }
        .task-btn.tugas2:hover { box-shadow: 0 15px 35px rgba(245,158,11,0.4); }
        
        footer { 
            margin-top: 50px; 
            color: #888; 
            font-size: 0.9em;
        }
        
        @media (max-width: 480px) {
            .container { padding: 30px 20px; margin: 10px; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apriliana Putri</h1>
        <p class="subtitle">Sosial Ekonomi Perikanan<br>Universitas Lambung Mangkurat</p>
        
        <div class="task-buttons">
            <a href="halaman1.html" class="task-btn tugas1">
                Tugas 1 - Biodata Diri
            </a>
            <a href="halaman2.html" class="task-btn tugas2">
                Tugas 2 - Data Demografi
            </a>
            <a herf="halaman1.html" style="background: var(--secondary-gradient); color: #10b981;"></a>
        </div>
    </div>

    <footer>
        <p>Daftar Tugas Akademik - Apriliana Putri</p>
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
