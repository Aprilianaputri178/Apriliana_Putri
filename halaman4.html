<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Transaksi & Submit - Batakan | 3/3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 50px 40px;
        }
        h1 { color: #333; text-align: center; margin-bottom: 40px; font-size: 1.7em; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        input, select { 
            width: 100%; padding: 15px; border: 2px solid #e1e5e9; 
            border-radius: 12px; font-size: 16px; transition: all 0.3s; 
            background: #f8f9fa;
        }
        input:focus, select:focus {
            outline: none; border-color: #4facfe; background: white;
            box-shadow: 0 0 0 4px rgba(79,172,254,0.1);
        }
        .date-group {
            display: grid; grid-template-columns: 2fr 2fr 3fr; gap: 12px;
        }
        .progress { 
            text-align: center; color: #666; margin-bottom: 20px;
            font-weight: bold; font-size: 0.9em;
        }
        button {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background: linear-gradient(135deg, #4facfe, #00f2fe); color: white;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79,172,254,0.4); }
        .link-next { background: linear-gradient(135deg, #11998e, #38ef7d); margin-top: 20px; }
        .storage-warning { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="progress">Progres: 3 dari 3 - Data Transaksi</div>
        <h1>Riwayat Transaksi Keuangan</h1>
        <div id="transaksiList"></div>
        <button onclick="addTransaksiRow()">Tambah Transaksi</button>
        <div class="nav-buttons" style="margin-top: 30px; display: flex; gap: 15px; flex-direction: column;">
            <a href="halaman3.html" style="text-decoration: none;">
                <button class="btn-prev">Kembali</button>
            </a>
            <button onclick="submitToSpreadsheet()" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);">Submit</button>
        </div>
    </div>

    <script>
        let transaksiCount = 0;

        function addTransaksiRow() {
            transaksiCount++;
            const div = document.createElement('div');
            div.className = 'transaksi-row';
            div.innerHTML = `
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Tanggal Transaksi #${transaksiCount}</label>
                    <div class="date-group">
                        <select class="tglTrans" onchange="this.parentElement.parentElement.parentElement.dataset.tgl=this.value">
                            <option value="">Tanggal</option><option value="">1</option>
                            <option value="">2</option><option value="">3</option>
                            <option value="">4</option><option value="">5</option>
                            <option value="">6</option><option value="">7</option>
                            <option value="">8</option><option value="">9</option>
                            <option value="">10</option><option value="">11</option>
                            <option value="">12</option><option value="">13</option>
                            <option value="">14</option><option value="">15</option>
                            <option value="">16</option><option value="">17</option>
                            <option value="">18</option><option value="">19</option>
                            <option value="">20</option><option value="">21</option>
                            <option value="">22</option><option value="">23</option>
                            <option value="">24</option><option value="">25</option>
                            <option value="">26</option><option value="">27</option>
                            <option value="">28</option><option value="">29</option>
                            <option value="">30</option><option value="">31</option>
                    </select>
                    <!-- abbreviated -->
                        </select>
                        <select class="blnTrans">
                            <option value="">Bulan</option><!-- abbreviated -->
                            <option value="">Jan</option><option value="">Feb</option><option value="">Mar</option>
                            <option value="">Apr</option><option value="">Mei</option>
                            <option value="">Jun</option><option value="">Jul</option>
                            <option value="">Ags</option><option value="">Sep</option>
                            <option value="">Okt</option><option value="">Nov</option><option value="">Des</option>
                        </select>
                        <select class="thnTrans">
                            <option value="">Tahun</option><!-- abbreviated -->
                            <option value="">2024</option><option value="">2025</option><option value="">2026</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Uraian Transaksi</label>
                    <input type="text" class="uraianTrans" placeholder="Contoh: Gaji bulanan">
                </div>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="jenisBtn debet" onclick="selectJenis(this)">Debet (-)</button>
                        <button type="button" class="jenisBtn kredit" onclick="selectJenis(this)">Kredit (+)</button>
                    </div>
                    <input type="number" class="jumlahTrans" placeholder="0" style="margin-top: 10px;">
                </div>
                <button onclick="this.parentElement.remove()" style="background: #dc3545; width: 100%; margin-top: 10px;">Hapus</button>
            `;
            document.getElementById('transaksiList').appendChild(div);
        }

        function selectJenis(btn) {
            btn.parentElement.querySelectorAll('.jenisBtn').forEach(b => b.style.background = '#e1e5e9');
            btn.style.background = '#28a745';
            const input = btn.closest('.form-group').querySelector('.jumlahTrans');
            input.dataset.jenis = btn.classList.contains('debet') ? 'Debet' : 'Kredit';
        }

        async function submitToSpreadsheet() {
            const demografi = JSON.parse(localStorage.getItem('demografiData') || '{}');
            const bank = JSON.parse(localStorage.getItem('bankData') || '{}');
            
            const transaksi = [];
            document.querySelectorAll('.transaksi-row').forEach(row => {
                const tgl = row.querySelector('.tglTrans').value;
                const bln = row.querySelector('.blnTrans').value;
                const thn = row.querySelector('.thnTrans').value;
                const uraian = row.querySelector('.uraianTrans').value;
                const jenis = row.querySelector('.jumlahTrans').dataset.jenis;
                const jumlah = row.querySelector('.jumlahTrans').value;
                if (tgl && bln && thn && uraian && jenis && jumlah) {
                    transaksi.push({tgl, bln, thn, uraian, jenis, jumlah});
                }
            });

            if (!demografi.nama || !bank.namaBank) {
                alert('Lengkapi data demografi & bank terlebih dahulu!');
                return;
            }

            const allData = {
                ...demografi,
                ...bank,
                transaksi: JSON.stringify(transaksi),
                totalTransaksi: transaksi.length,
                submitTime: new Date().toISOString()
            };

            const SCRIPT_URL = 'https://docs.google.com/spreadsheets/d/10zOXvLc1ns0U94agfAUmN5O_pF6yAOlah4Ct83cjnt8/edit?usp=drivesdk'; 
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allData)
                });
                
                alert('🎉 Data berhasil dikirim ke Google Spreadsheet!\nCek console untuk detail.');
                console.log('Data submitted:', allData);
                localStorage.clear(); 
            } catch (error) {
                alert(' Error: Setup Google Apps Script dulu!\nLihat petunjuk di bawah.');
                console.error(error);
            }
        }

        window.onload = addTransaksiRow;
    </script>
</body>
</html>
